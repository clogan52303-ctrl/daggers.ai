<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DAGGER.AI</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #0b0b0b;
      --panel: #111111;
      --panel-2: #161616;
      --line: #262626;
      --text: #f2f2f2;
      --muted: #a1a1a1;
      --accent: #ff2e2e;
      --accent-2: #ff4d4d;
      --error-bg: #2a0f0f;
      --error-line: #5a1a1a;
      --error-text: #ffb3b3;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
      padding: 32px 16px 48px;
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 52px;
      color: var(--accent);
      letter-spacing: -0.03em;
    }

    .sub {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 18px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 22px;
      margin-top: 18px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
    }

    .field.wide {
      grid-column: 1 / -1;
    }

    label {
      margin-bottom: 8px;
      font-size: 14px;
      color: #dddddd;
    }

    input,
    select,
    textarea,
    button {
      width: 100%;
      border-radius: 12px;
      border: 1px solid #2e2e2e;
      background: #0d0d0d;
      color: #ffffff;
      font-size: 15px;
      padding: 14px 15px;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    button {
      margin-top: 18px;
      background: var(--accent);
      border: none;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.15s ease;
    }

    button:hover {
      background: var(--accent-2);
    }

    button:active {
      transform: translateY(1px);
    }

    .placeholder {
      color: var(--muted);
      font-size: 15px;
    }

    .loading {
      color: #ffd1d1;
      font-weight: 700;
    }

    .error {
      margin-top: 16px;
      background: var(--error-bg);
      border: 1px solid var(--error-line);
      color: var(--error-text);
      padding: 14px;
      border-radius: 12px;
      white-space: pre-wrap;
    }

    .section {
      margin-top: 22px;
    }

    .section h3 {
      margin: 0 0 10px;
      font-size: 18px;
      color: var(--accent);
    }

    .section p,
    .section li {
      color: #ededed;
      line-height: 1.7;
    }

    ul {
      margin: 0;
      padding-left: 20px;
    }

    .score-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .score-box {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
    }

    .score-k {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .score-v {
      font-size: 32px;
      font-weight: 800;
      color: var(--text);
    }

    .song-box {
      background: linear-gradient(180deg, rgba(217,31,38,0.12), rgba(255,255,255,0.02));
      border: 1px solid rgba(217,31,38,0.25);
      border-radius: 16px;
      padding: 18px;
    }

    .song-title {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .footer-note {
      margin-top: 18px;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }

    @media (max-width: 860px) {
      h1 {
        font-size: 44px;
      }

      .grid,
      .score-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 580px) {
      body {
        padding: 20px 14px 40px;
      }

      h1 {
        font-size: 38px;
      }

      .sub {
        font-size: 16px;
      }

      .card {
        padding: 18px;
      }

      .grid,
      .score-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>DAGGER.AI</h1>
    <p class="sub">Find out why your music isn’t growing.</p>

    <div class="card">
      <div class="grid">
        <div class="field">
          <label for="artistName">Artist Name</label>
          <input id="artistName" type="text" placeholder="CodeanX6" />
        </div>

        <div class="field">
          <label for="genre">Genre</label>
          <input id="genre" type="text" placeholder="Dark trap / underground rap" />
        </div>

        <div class="field">
          <label for="spotifyLink">Spotify Link</label>
          <input id="spotifyLink" type="text" placeholder="https://open.spotify.com/artist/..." />
        </div>

        <div class="field">
          <label for="soundcloudLink">SoundCloud Link</label>
          <input id="soundcloudLink" type="text" placeholder="https://soundcloud.com/..." />
        </div>

        <div class="field">
          <label for="goal">Main Goal</label>
          <select id="goal">
            <option value="Streams">Streams</option>
            <option value="Followers">Followers</option>
            <option value="Branding">Branding</option>
            <option value="Fanbase">Fanbase</option>
            <option value="Releases">Releases</option>
          </select>
        </div>

        <div class="field">
          <label for="latestSong">Latest Song</label>
          <input id="latestSong" type="text" placeholder="Song title or link" />
        </div>

        <div class="field wide">
          <label for="notes">Extra Notes</label>
          <textarea id="notes" placeholder="What makes your sound different? What are you trying to push right now?"></textarea>
        </div>
      </div>

      <button id="analyzeBtn">Analyze My Profile</button>
      <div id="errorBox"></div>
    </div>

    <div class="card">
      <div id="placeholder" class="placeholder">Your report will show up here.</div>
      <div id="result"></div>
    </div>
  </div>

  <script>
    const analyzeBtn = document.getElementById('analyzeBtn');
    const resultBox = document.getElementById('result');
    const placeholder = document.getElementById('placeholder');
    const errorBox = document.getElementById('errorBox');

    function esc(str) {
      return String(str ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function renderList(items) {
      if (!Array.isArray(items) || !items.length) {
        return '<p>No data.</p>';
      }
      return '<ul>' + items.map(item => `<li>${esc(item)}</li>`).join('') + '</ul>';
    }

    function renderScores(scores) {
      const entries = [
        ['Branding Strength', scores?.brandingStrength],
        ['Marketability', scores?.marketability],
        ['Consistency', scores?.consistency],
        ['Replay Value', scores?.replayValue],
        ['Visual Identity', scores?.visualIdentity],
        ['Blow-Up Potential', scores?.blowUpPotential]
      ];

      return `
        <div class="score-grid">
          ${entries.map(([label, value]) => `
            <div class="score-box">
              <div class="score-k">${esc(label)}</div>
              <div class="score-v">${esc(value ?? 0)}/10</div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderReport(data) {
      resultBox.innerHTML = `
        <div class="section">
          <h3>Overall Verdict</h3>
          <p>${esc(data.overallVerdict || 'No verdict returned.')}</p>
        </div>

        <div class="section">
          <h3>Scores</h3>
          ${renderScores(data.scores)}
        </div>

        <div class="section">
          <h3>What’s Working</h3>
          ${renderList(data.working)}
        </div>

        <div class="section">
          <h3>What’s Hurting You</h3>
          ${renderList(data.hurting)}
        </div>

        <div class="section">
          <h3>Best Song To Push</h3>
          <div class="song-box">
            <div class="song-title">${esc(data.bestSongToPush?.track || 'Unknown')}</div>
            <p>${esc(data.bestSongToPush?.why || 'No reason returned.')}</p>
          </div>
        </div>

        <div class="section">
          <h3>7-Day Action Plan</h3>
          ${renderList(data.sevenDayPlan)}
        </div>

        <div class="section">
          <h3>Promo Captions</h3>
          ${renderList(data.promoCaptions)}
        </div>

        <div class="footer-note">DAGGER.AI report generated for independent artist development.</div>
      `;
    }

    analyzeBtn.addEventListener('click', async () => {
      errorBox.innerHTML = '';
      resultBox.innerHTML = '';
      placeholder.style.display = 'block';
      placeholder.innerHTML = '<span class="loading">Analyzing...</span>';

      const payload = {
        artistName: document.getElementById('artistName').value.trim(),
        genre: document.getElementById('genre').value.trim(),
        spotifyLink: document.getElementById('spotifyLink').value.trim(),
        soundcloudLink: document.getElementById('soundcloudLink').value.trim(),
        goal: document.getElementById('goal').value,
        latestSong: document.getElementById('latestSong').value.trim(),
        notes: document.getElementById('notes').value.trim()
      };

      try {
        const res = await fetch('/api/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const raw = await res.text();

        let data;
        try {
          data = JSON.parse(raw);
        } catch {
          throw new Error('Server returned non-JSON response:\\n' + raw);
        }

        if (!res.ok) {
          throw new Error(data.error || 'Request failed.');
        }

        placeholder.style.display = 'none';
        renderReport(data);
      } catch (err) {
        placeholder.style.display = 'block';
        placeholder.textContent = 'Your report will show up here.';
        errorBox.innerHTML = `<div class="error">${esc(err.message || 'Unknown error')}</div>`;
      }
    });
  </script>
</body>
</html>

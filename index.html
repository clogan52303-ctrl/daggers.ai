<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DAGGER.AI</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg: #0b0b0b;
      --panel: #141414;
      --line: #222;
      --text: #f3f3f3;
      --muted: #999;
      --accent: #ff2e2e;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 40px 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 10px;
      color: var(--accent);
    }

    p {
      color: #cfcfcf;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 20px;
      margin-top: 24px;
    }

    .grid {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }

    label {
      display: block;
      font-size: 14px;
      margin-bottom: 8px;
      color: #ddd;
    }

    input, select, textarea, button {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid #2a2a2a;
      background: #0f0f0f;
      color: #fff;
      font-size: 15px;
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    button {
      background: var(--accent);
      border: none;
      font-weight: bold;
      cursor: pointer;
      margin-top: 8px;
    }

    button:hover {
      opacity: 0.92;
    }

    .error {
      background: #2a0f0f;
      color: #ffb3b3;
      border: 1px solid #5a1a1a;
      padding: 12px 14px;
      border-radius: 10px;
      margin-top: 16px;
      white-space: pre-wrap;
    }

    .report {
      white-space: pre-wrap;
      line-height: 1.6;
      color: #f0f0f0;
    }

    .muted {
      color: var(--muted);
      font-size: 14px;
    }

    .loading {
      color: #ffb3b3;
      font-weight: bold;
    }

    .section-title {
      margin-top: 18px;
      margin-bottom: 8px;
      font-size: 18px;
      color: var(--accent);
      font-weight: bold;
    }

    .score-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      margin-top: 12px;
    }

    .score-box {
      background: #101010;
      border: 1px solid #252525;
      border-radius: 10px;
      padding: 12px;
    }

    .score-label {
      color: #bdbdbd;
      font-size: 13px;
      margin-bottom: 6px;
    }

    .score-value {
      font-size: 24px;
      font-weight: bold;
    }

    ul {
      padding-left: 18px;
      line-height: 1.6;
    }

    .footer-note {
      color: var(--muted);
      font-size: 12px;
      margin-top: 18px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>DAGGER.AI</h1>
    <p>Find out why your music isn’t growing.</p>

    <div class="card">
      <div class="grid">
        <div>
          <label for="artistName">Artist Name</label>
          <input id="artistName" type="text" placeholder="CodeanX6" />
        </div>

        <div>
          <label for="genre">Genre</label>
          <input id="genre" type="text" placeholder="Dark trap / underground rap" />
        </div>

        <div>
          <label for="spotifyLink">Spotify Link</label>
          <input id="spotifyLink" type="text" placeholder="https://open.spotify.com/artist/..." />
        </div>

        <div>
          <label for="soundcloudLink">SoundCloud Link</label>
          <input id="soundcloudLink" type="text" placeholder="https://soundcloud.com/..." />
        </div>

        <div>
          <label for="goal">Main Goal</label>
          <select id="goal">
            <option value="Streams">Streams</option>
            <option value="Followers">Followers</option>
            <option value="Branding">Branding</option>
            <option value="Fanbase">Fanbase</option>
            <option value="Releases">Releases</option>
          </select>
        </div>

        <div>
          <label for="latestSong">Latest Song</label>
          <input id="latestSong" type="text" placeholder="Song title or link" />
        </div>
      </div>

      <div style="margin-top:14px;">
        <label for="notes">Extra Notes</label>
        <textarea id="notes" placeholder="What makes your sound different? What are you trying to push right now?"></textarea>
      </div>

      <button id="analyzeBtn">Analyze My Profile</button>
      <div id="errorBox"></div>
    </div>

    <div class="card">
      <div id="placeholder" class="muted">Your report will show up here.</div>
      <div id="result"></div>
    </div>
  </div>

  <script>
    const analyzeBtn = document.getElementById('analyzeBtn');
    const resultBox = document.getElementById('result');
    const placeholder = document.getElementById('placeholder');
    const errorBox = document.getElementById('errorBox');

    function esc(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function renderList(items) {
      if (!Array.isArray(items) || items.length === 0) return '<p class="muted">No data.</p>';
      return '<ul>' + items.map(item => `<li>${esc(item)}</li>`).join('') + '</ul>';
    }

    function renderScores(scores) {
      if (!scores) return '';
      const entries = [
        ['Branding Strength', scores.brandingStrength],
        ['Marketability', scores.marketability],
        ['Consistency', scores.consistency],
        ['Replay Value', scores.replayValue],
        ['Visual Identity', scores.visualIdentity],
        ['Blow-Up Potential', scores.blowUpPotential]
      ];

      return `
        <div class="score-grid">
          ${entries.map(([label, value]) => `
            <div class="score-box">
              <div class="score-label">${esc(label)}</div>
              <div class="score-value">${esc(value ?? 0)}/10</div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderReport(data) {
      resultBox.innerHTML = `
        <div class="report">
          <div class="section-title">Overall Verdict</div>
          <p>${esc(data.overallVerdict || 'No verdict returned.')}</p>

          <div class="section-title">Scores</div>
          ${renderScores(data.scores)}

          <div class="section-title">What’s Working</div>
          ${renderList(data.working)}

          <div class="section-title">What’s Hurting You</div>
          ${renderList(data.hurting)}

          <div class="section-title">Best Song To Push</div>
          <p><strong>Track:</strong> ${esc(data.bestSongToPush?.track || 'Unknown')}</p>
          <p><strong>Why:</strong> ${esc(data.bestSongToPush?.why || 'No reason returned.')}</p>

          <div class="section-title">7-Day Action Plan</div>
          ${renderList(data.sevenDayPlan)}

          <div class="section-title">Promo Captions</div>
          ${renderList(data.promoCaptions)}

          <div class="footer-note">DAGGER.AI report generated for independent artist development.</div>
        </div>
      `;
    }

    analyzeBtn.addEventListener('click', async () => {
      errorBox.innerHTML = '';
      resultBox.innerHTML = '';
      placeholder.style.display = 'block';
      placeholder.innerHTML = '<span class="loading">Analyzing...</span>';

      const payload = {
        artistName: document.getElementById('artistName').value.trim(),
        genre: document.getElementById('genre').value.trim(),
        spotifyLink: document.getElementById('spotifyLink').value.trim(),
        soundcloudLink: document.getElementById('soundcloudLink').value.trim(),
        goal: document.getElementById('goal').value,
        latestSong: document.getElementById('latestSong').value.trim(),
        notes: document.getElementById('notes').value.trim()
      };

      try {
        const res = await fetch('/api/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const raw = await res.text();

        let data;
        try {
          data = JSON.parse(raw);
        } catch {
          throw new Error('Server returned non-JSON response:\\n' + raw);
        }

        if (!res.ok) {
          throw new Error(data.error || 'Request failed.');
        }

        placeholder.style.display = 'none';
        renderReport(data);
      } catch (err) {
        placeholder.style.display = 'block';
        placeholder.textContent = 'Your report will show up here.';
        errorBox.innerHTML = `<div class="error">${esc(err.message || 'Unknown error')}</div>`;
      }
    });
  </script>
</body>
</html>
